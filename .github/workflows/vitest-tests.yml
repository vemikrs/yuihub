name: Vitest Tests CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Note: push to main is handled by V1 Release workflow (tests run before release)

env:
  # Keep in sync with node-version in v1-release.yml
  NODE_VERSION: "24.14.1"

permissions:
  contents: read

jobs:
  v1-backend-tests:
    name: v1 Backend Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # setup-node must run BEFORE pnpm/action-setup (mirrors v1-release.yml order)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # Install build tools for native modules (tree-sitter requires node-gyp)
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 build-essential

      - name: Install dependencies (root + workspaces)
        run: pnpm install

      - name: Rebuild native modules
        run: pnpm rebuild --recursive

      # Cache HuggingFace models to avoid flaky downloads
      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-xenova-bge-m3-v1
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Build all packages
        run: pnpm build:all

      - name: Run Vitest tests
        run: pnpm test
        working-directory: apps/v1/backend

      # Verify VSCode extension packaging to catch dependency compatibility issues
      # (e.g. pnpm overrides forcing major-version bumps that break @vscode/vsce tools)
      - name: Verify VSCode extension packaging
        run: |
          cd apps/vscode-client
          mkdir -p /tmp/vsce-package-check
          npx @vscode/vsce package --no-dependencies --allow-missing-repository -o /tmp/vsce-package-check/ --pre-release
          echo "VSCode extension packaged successfully"
